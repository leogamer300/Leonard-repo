<!doctype html> 
<html lang="en"> 
<head>  
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>Task - 1</title> 
  <link rel="stylesheet" href="shopping list maker.css"/> 
</head> 
<body> 
    <div class="app-container"> 
    <div class="app-header"> 
        <h3>Shopping list</h3> 
        <p>Shopping List Maker</p>
    </div>  
    <form class="app-form"> 
      <input type="text"  class="input-name" placeholder="enter items..."/> 
      <input type="number" class="input-amount" placeholder="amount(gh$)"> 
      <button type="submit">add items</button>
    </form> 
    <ul class="app-items"></ul> 
    <h3 class="total"> 
        <span>TOTAL NO:</span> 
        <span class="total-amount">_________</span><a href="#">gh$</a>
    </h3>
    </div> 
    <script src="shopping list maker.js"></script>
</body>
